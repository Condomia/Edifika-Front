<div class="modal-backdrop" (click)="onCancel()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>Actualizar Usuario</h2>
      <button class="close-btn" (click)="onCancel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </header>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="form-body">
      
      <div class="form-group">
        <label for="user">Nombre de Usuario</label>
        <input type="text" id="user" formControlName="user" class="form-control" [class.is-invalid]="userForm.get('user')?.invalid && userForm.get('user')?.touched">
        <div class="error-text" *ngIf="userForm.get('user')?.invalid && userForm.get('user')?.touched">
          Nombre de usuario válido requerido.
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" class="form-control" [class.is-invalid]="userForm.get('email')?.invalid && userForm.get('email')?.touched">
        <div class="error-text" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
          Correo electrónico válido requerido.
        </div>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" formControlName="telefono" class="form-control" [class.is-invalid]="userForm.get('telefono')?.invalid && userForm.get('telefono')?.touched">
        <div class="error-text" *ngIf="userForm.get('telefono')?.invalid && userForm.get('telefono')?.touched">
          Teléfono válido requerido (solo números).
        </div>
      </div>

      <div class="form-group">
        <label for="status">Estado</label>
        <select id="status" formControlName="status" class="form-control">
          <option value="PENDING">Pendiente</option>
          <option value="VERIFIED">Verificado</option>
          <option value="ACTIVE">Activo</option>
          <option value="INACTIVE">Inactivo</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid || isSubmitting">
          <span *ngIf="!isSubmitting">Guardar Cambios</span>
          <span *ngIf="isSubmitting" class="loader"></span>
        </button>
      </div>
    </form>
  </div>
</div>
