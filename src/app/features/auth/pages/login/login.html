<div class="login-container">
  <div class="left">
    <h1>Elevating Residential Living</h1>
  </div>

  <div class="right">
    <div class="login-form">
      <div class="logo">
        <span class="material-icons">corporate_fare</span>
        <span>Edifika</span>
      </div>

      <div class="welcome-message">
        <h1>Welcome Back</h1>
        <p>Manage your property ecosystem with ease.</p>
      </div>

      <form
        class="login-fields"
        [formGroup]="loginForm"
        (ngSubmit)="login()"
        autocomplete="off">

        <label>EMAIL ADDRESS</label>

        <div class="input-row">
          <span class="material-icons-outlined">mail</span>

          <input
            type="email"
            formControlName="email"
            placeholder="admin@edifika.com"
            autocomplete="off">
        </div>

        <label>PASSWORD</label>

        <div class="input-row password-row">
  <span class="material-icons-outlined input-icon">
    lock
  </span>

          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="admin123"
            autocomplete="new-password">

          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            (mousedown)="$event.preventDefault()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            [title]="showPassword ? 'Hide password' : 'Show password'">

    <span class="material-icons-outlined">
      {{ showPassword ? 'visibility_off' : 'visibility' }}
    </span>
          </button>
        </div>

        <div class="form-options">
          <label class="remember-option">
            <input type="checkbox" formControlName="remember">
            <span>Remember this account</span>
          </label>

          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <p class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </p>

        <button
          type="submit"
          class="login-button"
          [disabled]="loginForm.invalid || isLoading">

          {{ isLoading ? 'Signing in...' : 'Login to Dashboard' }}
        </button>

        <button
          type="button"
          class="register-button"
          (click)="goToRegister()">

          Register New Account
        </button>
      </form>
    </div>

    <div class="credits">
      <p>© 2026 EDIFIKA RESIDENTIAL PLATFORM</p>
    </div>
  </div>
</div>
