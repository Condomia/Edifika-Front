<div class="register-container">
  <div class="left">
    <h1>Elevating Residential<br>Living</h1>
  </div>

  <div class="right">
    <div class="register-form">
      <div class="logo">
        <span class="material-icons">corporate_fare</span>
        <span>Edifika</span>
      </div>

      <div class="welcome-message">
        <h1>Create Admin Account</h1>
        <p>Register a new administrator account to access Edifika.</p>
      </div>

      <form class="register-fields" [formGroup]="registerForm" (ngSubmit)="register()">
        <label>FULL NAME</label>
        <div class="input-row">
          <span class="material-icons-outlined">person</span>
          <input type="text" formControlName="fullName" placeholder="Admin Edifika">
        </div>

        <label>EMAIL</label>
        <div class="input-row">
          <span class="material-icons-outlined">mail</span>
          <input type="email" formControlName="email" placeholder="admin@edifika.com">
        </div>

        <label>PASSWORD</label>
        <div class="input-row">
          <span class="material-icons-outlined">lock</span>
          <input type="password" formControlName="password" placeholder="********">
        </div>

        <label>PHONE</label>
        <div class="input-row">
          <span class="material-icons-outlined">phone</span>
          <input type="text" formControlName="phone" placeholder="999999999">
        </div>

        <label>DOCUMENT TYPE</label>
        <div class="input-row">
          <span class="material-icons-outlined">badge</span>
          <select formControlName="documentType">
            <option value="DNI">DNI</option>
            <option value="CE">CE</option>
            <option value="PASSPORT">PASSPORT</option>
          </select>
        </div>

        <label>DOCUMENT NUMBER</label>
        <div class="input-row">
          <span class="material-icons-outlined">assignment_ind</span>
          <input type="text" formControlName="documentNumber" placeholder="12345678">
        </div>

        <p class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </p>

        <p class="success-message" *ngIf="successMessage">
          {{ successMessage }}
        </p>

        <button
          type="submit"
          class="register-button"
          [disabled]="registerForm.invalid || isLoading">
          {{ isLoading ? 'Creating account...' : 'Create Admin Account' }}
        </button>

        <button
          type="button"
          class="login-button"
          (click)="goToLogin()">
          Back to Login
        </button>
      </form>
    </div>

    <div class="credits">
      <p>© 2026 EDIFIKA RESIDENTIAL PLATFORM</p>
    </div>
  </div>
</div>
