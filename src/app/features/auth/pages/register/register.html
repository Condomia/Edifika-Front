<div class="register-container">
  <div class="left">
    <h1>Elevating Residential
      Living</h1>
  </div>
  <div class="right">
    <div class="register-form">
      <div class="logo">
        <span class="material-icons">corporate_fare</span>
        <span>Edifika</span>
      </div>
      <div class="welcome-message">
        <h1>Create Account</h1>
        <p>Manage your property ecosystem with ease.</p>
      </div>
      <form class="register-fields">
        <label>EMAIL ADDRESS</label>
        <div class="input-row">
          <span class="material-icons-outlined">mail</span>
          <input type="email" value="admin@edifika.com">
        </div>

        <label>USER</label>
        <div class="input-row">
          <span class="material-icons-outlined">person</span>
          <input type="text" value="user">
        </div>

        <label>CELLPHONE</label>
        <div class="input-row">
          <span class="material-icons-outlined">call</span>
          <input type="text" value= "999999999" maxlength="9">
        </div>



        <label>PASSWORD</label>
        <div class="input-row">
          <span class="material-icons-outlined">lock</span>
          <input type="password" value="123456">
          <span class="material-icons">visibility</span>
        </div>

        <button type="submit" class="register-button">Register New Account</button>
        <button type="button" class="login-button" (click)="goToLogin()">Login to Dashboard</button>
      </form>

    </div>

    <div class="credits">
      <p>© 2026 EDIFIKA RESIDENTIAL PLATFORM</p>
    </div>
  </div>
</div>
