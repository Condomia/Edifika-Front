<div class="page-container">
  <div class="calendar-container">
    <app-calendar></app-calendar>
  </div>

  <div class="area-container">
    <div class="area-title">
      <h1>Manage Areas</h1>
      <p>Configure rules and availability for common amenities.</p>
    </div>

    <div class="area-list">
      <app-common-area-list   (editRules)="openEditModal($event)"
                              (statusChanged)="updateAreaStatus($event)">
        >
        ></app-common-area-list>

      <button class="add-area-button" (click)="openCreateModal()">
        Add New Area
      </button>
    </div>
  </div>
</div>

<div class="modal-backdrop" *ngIf="showCreateModal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Create Common Area</h2>
      <button class="close-button" (click)="closeCreateModal()">×</button>
    </div>

    <form [formGroup]="areaForm" (ngSubmit)="createArea()">
      <label>Area Name</label>
      <input formControlName="name" type="text" placeholder="Example: BBQ Area" />

      <div class="form-row">
        <div>
          <label>Type</label>
          <select formControlName="type">
            <option value="POOL">Pool</option>
            <option value="GYM">Gym</option>
            <option value="COWORKING_ROOM">Coworking Room</option>
            <option value="BBQ_AREA">BBQ Area</option>
            <option value="PARTY_ROOM">Party Room</option>
            <option value="MEETING_ROOM">Meeting Room</option>
            <option value="TERRACE">Terrace</option>
          </select>
        </div>

        <div>
          <label>Capacity</label>
          <input formControlName="maxCapacity" type="number" min="1" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Booking Type</label>
          <select formControlName="bookingType">
            <option value="SHARED">Shared</option>
            <option value="EXCLUSIVE">Exclusive</option>
          </select>
        </div>

        <div>
          <label>Status</label>
          <select formControlName="status">
            <option value="AVAILABLE">Available</option>
            <option value="MAINTENANCE">Maintenance</option>
          </select>
        </div>
      </div>

      <h3>Rules</h3>

      <div class="form-row">
        <div>
          <label>Max Hours</label>
          <input formControlName="maxReservationHours" type="number" min="1" />
        </div>

        <div>
          <label>Price</label>
          <input formControlName="price" type="number" min="0" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Guarantee Amount</label>
          <input formControlName="guaranteeAmount" type="number" min="0" />
        </div>

        <div>
          <label>Penalty Amount</label>
          <input formControlName="penaltyAmount" type="number" min="0" />
        </div>
      </div>

      <label>Penalty Hours Before</label>
      <input formControlName="penaltyHoursBefore" type="number" min="0" />

      <div class="switch-list">


        <label>
          Allow Cancellation
          <input type="checkbox" formControlName="allowCancellation" />
        </label>

        <label>
          Requires Approval
          <input type="checkbox" formControlName="requiresApproval" />
        </label>
      </div>

      <div class="modal-actions">
        <button type="button" class="cancel-button" (click)="closeCreateModal()">
          Cancel
        </button>

        <button type="submit" class="save-button" [disabled]="areaForm.invalid">
          Create Area
        </button>
      </div>
    </form>
  </div>
</div>
<div class="modal-backdrop" *ngIf="showEditModal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Edit Common Area Rules</h2>
      <button class="close-button" (click)="closeEditModal()">×</button>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="updateRules()">
      <label>Area Name</label>
      <input formControlName="name" type="text" />

      <div class="form-row">
        <div>
          <label>Type</label>
          <select formControlName="type">
            <option value="POOL">Pool</option>
            <option value="GYM">Gym</option>
            <option value="COWORKING_ROOM">Coworking Room</option>
            <option value="BBQ_AREA">BBQ Area</option>
            <option value="PARTY_ROOM">Party Room</option>
            <option value="MEETING_ROOM">Meeting Room</option>
            <option value="TERRACE">Terrace</option>
          </select>
        </div>

        <div>
          <label>Capacity</label>
          <input formControlName="maxCapacity" type="number" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Booking Type</label>
          <select formControlName="bookingType">
            <option value="SHARED">Shared</option>
            <option value="EXCLUSIVE">Exclusive</option>
          </select>
        </div>

        <div>
          <label>Status</label>
          <select formControlName="status">
            <option value="AVAILABLE">Available</option>
            <option value="MAINTENANCE">Maintenance</option>
          </select>
        </div>
      </div>

      <h3>Rules</h3>

      <div class="form-row">
        <div>
          <label>Max Hours</label>
          <input formControlName="maxReservationHours" type="number" />
        </div>

        <div>
          <label>Price</label>
          <input formControlName="price" type="number" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Guarantee Amount</label>
          <input formControlName="guaranteeAmount" type="number" />
        </div>

        <div>
          <label>Penalty Amount</label>
          <input formControlName="penaltyAmount" type="number" />
        </div>
      </div>

      <label>Penalty Hours Before</label>
      <input formControlName="penaltyHoursBefore" type="number" />

      <div class="switch-list">
        <label>
          Allow Cancellation
          <input type="checkbox" formControlName="allowCancellation" />
        </label>

        <label>
          Requires Approval
          <input type="checkbox" formControlName="requiresApproval" />
        </label>
      </div>

      <div class="modal-actions">
        <button type="button" class="cancel-button" (click)="closeEditModal()">
          Cancel
        </button>

        <button type="submit" class="save-button">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
